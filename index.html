<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Fabrika → Varış Yeri Mesafe Hesaplama</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>

/* GENEL */
body {
  font-family: Arial, sans-serif;
  margin: 10px;
}

h2 {
  margin-bottom: 10px;
}

.controls {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.controls > div {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 0.8em;
  margin-bottom: 4px;
}

select,
input,
button {
  font-size: 0.8em;
  padding: 4px 6px;
  height: 30px;
  box-sizing: border-box;
}

/* TEK TEK GENİŞLİKLER */
#start {
  width: 110px;
}

#end {
  width: 150px;
}

button {
  width: 95px;
  white-space: nowrap;
}

#map {
  height: 500px;
  width: 100%;
  margin-top: 5px;
}

#result {
  margin-top: 8px;
  min-height: 110px;
  max-height: 110px;
  overflow-y: auto;
  white-space: pre-line;
  line-height: 22px;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>Fabrika → Varış Yeri Mesafe Hesaplama</h2>

<div class="controls">
  <div>
    <label>Başlangıç Noktası</label><br>
    <select id="start">
      <option value="">Fabrika seçiniz</option>
      <option value="corlu">Çorlu</option>
      <option value="kirikkale">Kırıkkale</option>
    </select>
  </div>

  <div>
    <label>Varış Yeri</label><br>
    <input type="text" id="end" placeholder="Şehir giriniz">
  </div>

  <div>
    <button onclick="hesapla()">Hesapla</button>
  </div>

  <div>
    <button onclick="temizle()">Seçimi Temizle</button>
  </div>
</div>

<div id="map"></div>

<div id="result">Varış yeri seçilmedi.</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// HARİTA BAŞLAT
var map = L.map('map').setView([39, 35], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ÖRNEK FONKSİYONLAR (mevcut kodun varsa bunları değiştirirsin)

function hesapla() {
  document.getElementById("result").innerText = "Hesaplama yapıldı (örnek).";
}

function temizle() {
  document.getElementById("start").value = "";
  document.getElementById("end").value = "";
  document.getElementById("result").innerText = "Temizlendi.";
}

</script>

</body>
</html>
