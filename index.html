<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>Fabrika → Varış Yeri Mesafe Hesaplama</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h2 {
      margin-bottom: 16px;
      font-size: 24px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 15px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      min-width: 240px;
      position: relative;
    }

    label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    select, input, button {
      padding: 10px;
      font-size: 15px;
    }

    button {
      cursor: pointer;
      min-width: 140px;
    }

    #map {
      height: 500px;
      width: 100%;
      margin-top: 10px;
    }

    #info {
      margin-top: 15px;
      line-height: 1.6;
    }

    .info-line {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .my-line {
      color: #0b3d91;
    }

    .rival-line {
      color: #c79a00;
    }

    .arkoz-line {
      color: #c62828;
    }

    .warn-line {
      color: #b00020;
    }

    #suggestions {
      position: absolute;
      top: 73px;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ccc;
      max-height: 220px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .suggestion-item {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      font-size: 14px;
    }

    .suggestion-item:hover {
      background: #f2f2f2;
    }
  </style>
</head>
<body>

  <h2>Fabrika → Varış Yeri Mesafe Hesaplama</h2>

  <div class="controls">
    <div class="control-group">
      <label for="startSelect">Başlangıç Noktası</label>
      <select id="startSelect">
        <option value="kirikkale">Kırıkkale Fabrika</option>
        <option value="corlu">Çorlu Fabrika</option>
      </select>
    </div>

    <div class="control-group">
      <label for="destinationInput">Varış Yeri</label>
      <input type="text" id="destinationInput" placeholder="Örn: Zile, Tokat" autocomplete="off" />
      <div id="suggestions"></div>
    </div>

    <div class="control-group">
      <button id="calculateBtn">Hesapla</button>
    </div>

    <div class="control-group">
      <button id="clearBtn" type="button">Seçimi Temizle</button>
    </div>
  </div>

  <div id="map"></div>
  <div id="info">Varış yeri seçilmedi.</div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const PRICE_API_URL = "https://script.google.com/macros/s/AKfycbyoiajcbWbl-pkn37lXOtA399MlcPBiezliboucvTnEpnHvYaFZ0vto6-ShFtcgEBKoNw/exec";

    const MY_COLOR = "#0b3d91";
    const RIVAL_COLOR = "#c79a00";
    const ARKOZ_COLOR = "#c62828";

    const factories = {
      kirikkale: {
        name: "Kırıkkale Fabrika",
        coords: [39.761207, 33.473725]
      },
      corlu: {
        name: "Çorlu Fabrika",
        coords: [41.27813, 27.60747]
      }
    };

    const rivalStartPoints = {
      bilecik: { name: "Bilecik", coords: [40.28976, 30.01532] },
      btg: { name: "BTG", coords: [37.02365, 36.12729] },
      dilovasi: { name: "Dilovası", coords: [40.81595, 29.55779] },
      saray: { name: "Saray", coords: [41.41223, 27.83725] },
      catalca: { name: "Çatalca", coords: [41.20506, 28.45473] },
      arkoz: { name: "Arkoz", coords: [41.01296, 35.81233] },
      antalya: { name: "Antalya", coords: [37.09081, 30.61814] },
      ege: { name: "EGE", coords: [38.43191, 27.22041] }
    };

    const arkozFactory = {
      name: "Arkoz",
      coords: [41.01296, 35.81233]
    };

    let priceData = [];
    let selectedDestination = null;
    let apiHasLokasyonKey = false;

    let myRouteLine = null;
    let rivalRouteLine = null;
    let arkozRouteLine = null;

    let startMarker = null;
    let endMarker = null;
    let rivalStartMarker = null;
    let arkozStartMarker = null;

    const startSelect = document.getElementById("startSelect");
    const destinationInput = document.getElementById("destinationInput");
    const suggestionsBox = document.getElementById("suggestions");
    const calculateBtn = document.getElementById("calculateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const infoBox = document.getElementById("info");

    const map = L.map("map").setView([39.9, 34.5], 6);

    L.tileLayer("https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/ç/g, "c")
        .replace(/ğ/g, "g")
        .replace(/ı/g, "i")
        .replace(/i̇/g, "i")
        .replace(/ö/g, "o")
        .replace(/ş/g, "s")
        .replace(/ü/g, "u")
        .replace(/\s+/g, " ")
        .trim();
    }

    function clearMapLayers() {
      if (myRouteLine) { map.removeLayer(myRouteLine); myRouteLine = null; }
      if (rivalRouteLine) { map.removeLayer(rivalRouteLine); rivalRouteLine = null; }
      if (arkozRouteLine) { map.removeLayer(arkozRouteLine); arkozRouteLine = null; }

      if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
      if (endMarker) { map.removeLayer(endMarker); endMarker = null; }
      if (rivalStartMarker) { map.removeLayer(rivalStartMarker); rivalStartMarker = null; }
      if (arkozStartMarker) { map.removeLayer(arkozStartMarker); arkozStartMarker = null; }
    }

    function resetAll() {
      clearMapLayers();
      startSelect.value = "kirikkale";
      destinationInput.value = "";
      selectedDestination = null;
      suggestionsBox.innerHTML = "";
      suggestionsBox.style.display = "none";
      infoBox.innerHTML = "Varış yeri seçilmedi.";
      map.setView([39.9, 34.5], 6);
    }

    async function loadPriceData(forceReload = false) {
      if (!forceReload && priceData.length > 0) return priceData;

      const cacheBreaker = "t=" + Date.now();
      const url = PRICE_API_URL + (PRICE_API_URL.includes("?") ? "&" : "?") + cacheBreaker;

      const response = await fetch(url, { cache: "no-store" });
      const data = await response.json();

      if (!Array.isArray(data)) {
        throw new Error("Sheet verisi dizi formatında gelmedi.");
      }

      priceData = data.map(row => {
        const newRow = { ...row };

        Object.keys(newRow).forEach(key => {
          if (typeof newRow[key] === "string") {
            newRow[key] = newRow[key].trim();
          }
        });

        return newRow;
      });

      apiHasLokasyonKey = priceData.some(row =>
        normalizeText(row.lokasyon_key_normalized || row.lokasyon_key || "") !== ""
      );

      return priceData;
    }

    function getUniqueSheetIller() {
      const set = new Set();

      priceData.forEach(row => {
        const ilValue = normalizeText(row.il_normalized || row.il || "");
        if (ilValue) {
          set.add(ilValue);
        }
      });

      return Array.from(set);
    }

    function getAddressValues(destinationObj) {
      const address = destinationObj && destinationObj.address ? destinationObj.address : {};
      return [
        address.city,
        address.town,
        address.state,
        address.province,
        address.county,
        address.city_district,
        address.state_district,
        address.municipality,
        address.suburb,
        address.village
      ]
      .map(x => normalizeText(x))
      .filter(Boolean);
    }

    function getDisplayParts(text) {
      return String(text || "")
        .split(",")
        .map(x => normalizeText(x))
        .filter(Boolean);
    }

    function resolveDestinationForSheet(destinationObj, inputText) {
      const displayText = destinationObj?.display_name || inputText || "";
      const displayParts = getDisplayParts(displayText);
      const addressValues = getAddressValues(destinationObj);
      const provinceList = getUniqueSheetIller();

      const searchPool = [...displayParts, ...addressValues];
      let province = "";

      for (const part of searchPool) {
        if (provinceList.includes(part)) {
          province = part;
          break;
        }
      }

      if (!province && displayParts.length > 0) {
        province = displayParts[0];
      }

      const firstPart = displayParts[0] || "";
      let districtKey = "";

      if (firstPart && province && firstPart !== province) {
        districtKey = firstPart;
      }

      return {
        province,
        districtKey,
        displayText
      };
    }

    function getFactoryMatchedRows(rows, selectedFactoryKey) {
  const selectedFactoryName = normalizeText(factories[selectedFactoryKey]?.name || "");

  return rows.filter(row =>
    normalizeText(row.stt_baslangic_normalized || row.stt_baslangic || "") === selectedFactoryName
  );
}

    function findSheetRow(destinationObj, inputText, selectedFactoryKey) {
  const resolved = resolveDestinationForSheet(destinationObj, inputText);

  if (!resolved.province) return null;

  const provinceRows = priceData.filter(row =>
    normalizeText(row.il_normalized || row.il || "") === resolved.province
  );

  if (provinceRows.length === 0) {
    return null;
  }

  const factoryRows = getFactoryMatchedRows(provinceRows, selectedFactoryKey);

  // Seçilen fabrikaya ait hiç satır yoksa başka fabrikanın fiyatına düşme
  if (factoryRows.length === 0) {
    return null;
  }

  if (resolved.districtKey) {
    const exactDistrictRows = factoryRows.filter(row =>
      normalizeText(row.lokasyon_key_normalized || row.lokasyon_key || "") === resolved.districtKey
    );

    if (exactDistrictRows.length > 0) {
      return exactDistrictRows[0];
    }
  }

  const blankLokasyonRows = factoryRows.filter(row =>
    normalizeText(row.lokasyon_key_normalized || row.lokasyon_key || "") === ""
  );

  if (blankLokasyonRows.length > 0) {
    return blankLokasyonRows[0];
  }

  return factoryRows[0] || null;
}

    function formatDate(value) {
      if (!value) return "";

      if (typeof value === "string") {
        if (value.includes("T")) {
          return value.split("T")[0].split("-").reverse().join(".");
        }
        return value;
      }

      return String(value);
    }

    function getOwnPriceFromRow(sheetRow, selectedFactoryKey) {
      if (!sheetRow) return { price: "", date: "" };

      if (selectedFactoryKey === "corlu") {
        return {
          price: sheetRow.stt_corlu_fiyat || sheetRow.stt_fiyat || "",
          date: formatDate(sheetRow.stt_corlu_tarih || sheetRow.stt_tarih || "")
        };
      }

      return {
        price: sheetRow.stt_kirikkale_fiyat || sheetRow.stt_fiyat || "",
        date: formatDate(sheetRow.stt_kirikkale_tarih || sheetRow.stt_tarih || "")
      };
    }

    async function fetchBestRoute(start, end) {
      const url =
        "https://router.project-osrm.org/route/v1/driving/" +
        start[1] + "," + start[0] + ";" +
        end[1] + "," + end[0] +
        "?alternatives=true&overview=full&geometries=geojson";

      const response = await fetch(url);
      const data = await response.json();

      if (!data.routes || data.routes.length === 0) {
        return null;
      }

      let bestRoute = data.routes[0];

      for (let i = 1; i < data.routes.length; i++) {
        if (data.routes[i].distance < bestRoute.distance) {
          bestRoute = data.routes[i];
        }
      }

      return bestRoute;
    }

    function renderInfo(myFactoryName, destinationName, myDistance, myPriceData, rivalData, arkozData, extraWarnings = []) {
      let myText =
        "Başlangıç: " + myFactoryName +
        " | Varış: " + destinationName +
        " | Mesafe: " + myDistance + " km";

      if (myPriceData && myPriceData.price) {
        myText +=
          " | Nakliye: " + myPriceData.price + " TL/ton" +
          (myPriceData.date ? " | Fiyat Güncelleme Tarihi: " + myPriceData.date : "");
      } else {
        myText += " | Nakliye: TANIMLI DEĞİL";
      }

      let html = '<div class="info-line my-line">' + myText + '</div>';

      if (rivalData) {
        let rivalText =
          "Rakip Çıkış Noktası: " + rivalData.name +
          " | Varış: " + destinationName +
          " | Mesafe: " + rivalData.distance + " km";

        if (rivalData.price) {
          rivalText +=
            " | Nakliye: " + rivalData.price + " TL/ton" +
            (rivalData.date ? " | Fiyat Güncelleme Tarihi: " + rivalData.date : "");
        } else {
          rivalText += " | Nakliye: TANIMLI DEĞİL";
        }

        html += '<div class="info-line rival-line">' + rivalText + '</div>';
      }

      if (arkozData) {
        let arkozText =
          "Rakip Çıkış Noktası: " + arkozData.name +
          " | Varış: " + destinationName +
          " | Mesafe: " + arkozData.distance + " km";

        if (arkozData.price) {
          arkozText +=
            " | Nakliye: " + arkozData.price + " TL/ton" +
            (arkozData.date ? " | Fiyat Güncelleme Tarihi: " + arkozData.date : "");
        } else {
          arkozText += " | Nakliye: TANIMLI DEĞİL";
        }

        html += '<div class="info-line arkoz-line">' + arkozText + '</div>';
      }

      extraWarnings.forEach(warn => {
        html += '<div class="info-line warn-line">' + warn + '</div>';
      });

      infoBox.innerHTML = html;
    }

    async function renderRoute() {
      if (!selectedDestination) {
        infoBox.innerHTML = "Lütfen varış yeri seç.";
        return;
      }

      await loadPriceData(true);

      const selectedFactoryKey = startSelect.value;
      const selectedFactory = factories[selectedFactoryKey];
      const start = selectedFactory.coords;
      const end = [parseFloat(selectedDestination.lat), parseFloat(selectedDestination.lon)];
      const destinationTextForPricing = destinationInput.value || selectedDestination.display_name || "";

      clearMapLayers();

      startMarker = L.marker(start).addTo(map).bindPopup(selectedFactory.name);
      endMarker = L.marker(end).addTo(map).bindPopup(selectedDestination.display_name);

      infoBox.innerHTML = '<div class="info-line my-line">Mesafe hesaplanıyor...</div>';

      try {
        const sheetRow = findSheetRow(selectedDestination, destinationTextForPricing, selectedFactoryKey);
        const myRoute = await fetchBestRoute(start, end);

        if (!myRoute) {
          infoBox.innerHTML = "Rota bulunamadı.";
          return;
        }

        const myDistance = (myRoute.distance / 1000).toFixed(1);
        const ownPrice = getOwnPriceFromRow(sheetRow, selectedFactoryKey);

        const myPriceData = {
          price: ownPrice.price,
          date: ownPrice.date
        };

        const myCoords = myRoute.geometry.coordinates.map(coord => [coord[1], coord[0]]);
        myRouteLine = L.polyline(myCoords, {
          color: MY_COLOR,
          weight: 5
        }).addTo(map);

        let rivalData = null;
        let arkozData = null;
        const warnings = [];

        if (!apiHasLokasyonKey) {
          warnings.push("Uyarı: API çıktısında lokasyon_key alanı görünmüyor. App Script eski deployment olabilir.");
        }

        if (sheetRow && (sheetRow.ytong_baslangic_normalized || sheetRow.ytong_baslangic)) {
          const ytongKey = normalizeText(sheetRow.ytong_baslangic_normalized || sheetRow.ytong_baslangic || "");
          const ytongStartPoint = rivalStartPoints[ytongKey];

          if (ytongStartPoint) {
            const rivalStart = ytongStartPoint.coords;

            rivalStartMarker = L.marker(rivalStart)
              .addTo(map)
              .bindPopup("Ytong - " + ytongStartPoint.name);

            const rivalRoute = await fetchBestRoute(rivalStart, end);

            if (rivalRoute) {
              const rivalDistance = (rivalRoute.distance / 1000).toFixed(1);

              const rivalCoords = rivalRoute.geometry.coordinates.map(coord => [coord[1], coord[0]]);
              rivalRouteLine = L.polyline(rivalCoords, {
                color: RIVAL_COLOR,
                weight: 5
              }).addTo(map);

              rivalData = {
                name: "Ytong - " + ytongStartPoint.name,
                distance: rivalDistance,
                price: sheetRow.ytong_fiyat || "",
                date: formatDate(sheetRow.ytong_tarih || "")
              };
            }
          }
        }

        if (arkozFactory) {
          const arkozStart = arkozFactory.coords;

          arkozStartMarker = L.marker(arkozStart).addTo(map).bindPopup(arkozFactory.name);

          const arkozRoute = await fetchBestRoute(arkozStart, end);

          if (arkozRoute) {
            const arkozDistance = (arkozRoute.distance / 1000).toFixed(1);

            const arkozCoords = arkozRoute.geometry.coordinates.map(coord => [coord[1], coord[0]]);
            arkozRouteLine = L.polyline(arkozCoords, {
              color: ARKOZ_COLOR,
              weight: 5
            }).addTo(map);

            arkozData = {
              name: arkozFactory.name,
              distance: arkozDistance,
              price: sheetRow ? (sheetRow.arkoz_fiyat || "") : "",
              date: sheetRow ? formatDate(sheetRow.arkoz_tarih || "") : ""
            };
          }
        }

        renderInfo(
          selectedFactory.name,
          selectedDestination.display_name,
          myDistance,
          myPriceData,
          rivalData,
          arkozData,
          warnings
        );

        const group = [];
        if (myRouteLine) group.push(myRouteLine);
        if (rivalRouteLine) group.push(rivalRouteLine);
        if (arkozRouteLine) group.push(arkozRouteLine);
        if (startMarker) group.push(startMarker);
        if (rivalStartMarker) group.push(rivalStartMarker);
        if (arkozStartMarker) group.push(arkozStartMarker);
        if (endMarker) group.push(endMarker);

        if (group.length > 0) {
          const featureGroup = L.featureGroup(group);
          map.fitBounds(featureGroup.getBounds(), { padding: [20, 20] });
        }

        if (!sheetRow) {
          infoBox.innerHTML += '<div class="info-line warn-line">Uyarı: Sheet içinde bu varış yeri için eşleşen satır bulunamadı.</div>';
        }

      } catch (error) {
        console.error(error);
        infoBox.innerHTML = "Hata oluştu: rota verisi veya fiyat verisi alınamadı.";
      }
    }

    let searchTimeout = null;

    destinationInput.addEventListener("input", function () {
      const query = this.value.trim();
      selectedDestination = null;

      if (query.length < 3) {
        suggestionsBox.style.display = "none";
        suggestionsBox.innerHTML = "";
        return;
      }

      clearTimeout(searchTimeout);

      searchTimeout = setTimeout(() => {
        const searchUrl =
          "https://nominatim.openstreetmap.org/search?format=json&limit=5&addressdetails=1&countrycodes=tr&q=" +
          encodeURIComponent(query);

        fetch(searchUrl, {
          headers: {
            "Accept-Language": "tr"
          }
        })
          .then(response => response.json())
          .then(results => {
            suggestionsBox.innerHTML = "";

            if (!results || results.length === 0) {
              suggestionsBox.style.display = "none";
              return;
            }

            results.forEach(item => {
              const div = document.createElement("div");
              div.className = "suggestion-item";
              div.textContent = item.display_name;

              div.addEventListener("click", function () {
                destinationInput.value = item.display_name;
                selectedDestination = item;
                suggestionsBox.style.display = "none";
                suggestionsBox.innerHTML = "";
              });

              suggestionsBox.appendChild(div);
            });

            suggestionsBox.style.display = "block";
          })
          .catch(error => {
            console.error(error);
            suggestionsBox.style.display = "none";
          });
      }, 400);
    });

    document.addEventListener("click", function (e) {
      if (!suggestionsBox.contains(e.target) && e.target !== destinationInput) {
        suggestionsBox.style.display = "none";
      }
    });

    calculateBtn.addEventListener("click", function () {
      renderRoute();
    });

    clearBtn.addEventListener("click", function () {
      resetAll();
    });
  </script>

</body>
</html>
