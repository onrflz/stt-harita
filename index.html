<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Fabrika → Varış Yeri Mesafe Hesaplama</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>

/* GENEL */
body {
  font-family: Arial, sans-serif;
  margin: 10px;
}

/* BAŞLIK */
h2 {
  margin-bottom: 10px;
}

/* ÜST KONTROL ALANI */
.controls {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

/* INPUT + SELECT + BUTTON (%80 BOYUT) */
select,
input,
button {
  font-size: 0.8em;
  padding: 5px 8px;
  height: 30px;
}

/* LABEL */
label {
  font-size: 0.8em;
}

/* HARİTA */
#map {
  height: 500px;
  width: 100%;
  margin-top: 5px;
}

/* AÇIKLAMA ALANI (5 SATIR SABİT) */
#result {
  margin-top: 8px;
  min-height: 110px;
  max-height: 110px;
  overflow-y: auto;
  white-space: pre-line;
  line-height: 22px;
  font-size: 14px;
}

</style>
</head>

<body>

<h2>Fabrika → Varış Yeri Mesafe Hesaplama</h2>

<div class="controls">
  <div>
    <label>Başlangıç Noktası</label><br>
    <select id="start">
      <option value="">Fabrika seçiniz</option>
      <option value="corlu">Çorlu</option>
      <option value="kirikkale">Kırıkkale</option>
    </select>
  </div>

  <div>
    <label>Varış Yeri</label><br>
    <input type="text" id="end" placeholder="Şehir giriniz">
  </div>

  <div>
    <button onclick="hesapla()">Hesapla</button>
  </div>

  <div>
    <button onclick="temizle()">Seçimi Temizle</button>
  </div>
</div>

<div id="map"></div>

<div id="result">Varış yeri seçilmedi.</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// HARİTA BAŞLAT
var map = L.map('map').setView([39, 35], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ÖRNEK FONKSİYONLAR (mevcut kodun varsa bunları değiştirirsin)

function hesapla() {
  document.getElementById("result").innerText = "Hesaplama yapıldı (örnek).";
}

function temizle() {
  document.getElementById("start").value = "";
  document.getElementById("end").value = "";
  document.getElementById("result").innerText = "Temizlendi.";
}

</script>

</body>
</html>
